<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Base platform -->
  <rect x="3" y="41" width="42" height="4" rx="2" fill="#0A1128"/>
  <!-- Step -->
  <rect x="7" y="38" width="34" height="3" rx="1.5" fill="#0A1128"/>

  <!-- Left pillar -->
  <rect x="9"  y="15" width="7" height="23" rx="1" fill="#0A1128"/>
  <!-- Middle pillar (tallest) -->
