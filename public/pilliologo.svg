  <!-- Right pillar -->
  <rect x="32" y="15" width="7" height="23" rx="1" fill="#0A1128"/>

  <!-- Top caps — teal accent -->
  <rect x="7"   y="12" width="11" height="3" rx="1" fill="#00E5FF"/>
  <rect x="18.5" y="6"  width="11" height="3" rx="1" fill="#00E5FF"/>
  <rect x="30"  y="12" width="11" height="3" rx="1" fill="#00E5FF"/>
</svg>
